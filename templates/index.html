<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridWorld 強化學習視覺化</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="dashboard">
        <aside class="control-panel glass-panel">
            <h2>GridWorld 控制面板</h2>

            <div class="control-group">
                <label for="grid-size">網格大小 ($n$):</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="grid-size" min="5" max="9" value="5" style="width: 100%;">
                    <button id="btn-resize" class="action-btn">調整大小</button>
                </div>
            </div>

            <div class="control-group">
                <h3>繪圖工具</h3>
                <div class="tool-group">
                    <button id="tool-start" class="tool-btn active" data-tool="start">起點</button>
                    <button id="tool-goal" class="tool-btn" data-tool="goal">終點 (目標)</button>
                    <button id="tool-obstacle" class="tool-btn" data-tool="obstacle">繪製障礙物</button>
                </div>
                <button id="btn-clear" class="action-btn secondary">清除網格</button>
            </div>

            <div class="control-group algorithms">
                <h3>動態規劃演算法</h3>
                <button id="btn-evaluate" class="action-btn primary">隨機策略評估</button>
                <button id="btn-optimize" class="action-btn primary highlight">執行價值迭代</button>
            </div>

            <div class="status-panel">
                <p id="status-text">狀態：環境已準備就緒。</p>
            </div>
        </aside>

        <main class="grid-container-wrapper">
            <div id="grid-container" class="grid-container glass-panel" style="--grid-size: 5;">
                <!-- Mathematical grid cells injected via pure vanilla JavaScript -->
            </div>
        </main>
    </div>

    <script src="/static/main.js"></script>
</body>

</html>
